<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediAssist AI - Smart SDG 3 Health Companion</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💊</text></svg>">
  <!-- Premium Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-deep: #0b0f19;
      --bg-card: rgba(23, 31, 50, 0.75);
      --bg-card-hover: rgba(30, 41, 67, 0.85);
      --primary: #00d2c4;
      --primary-glow: rgba(0, 210, 196, 0.25);
      --primary-gradient: linear-gradient(135deg, #00d2c4 0%, #008fa2 100%);
      --secondary: #6366f1;
      --secondary-glow: rgba(99, 102, 241, 0.25);
      --secondary-gradient: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
      --accent-gold: #fbbf24;
      --accent-red: #f87171;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border-light: rgba(255, 255, 255, 0.08);
      --border-active: rgba(0, 210, 196, 0.4);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --font-display: 'Outfit', 'Inter', sans-serif;
      --font-body: 'Inter', sans-serif;
      --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 0 40px rgba(0, 210, 196, 0.05);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-deep);
      color: var(--text-primary);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(0, 210, 196, 0.08) 0%, transparent 40%);
      background-attachment: fixed;
    }

    /* Glassmorphism Utilities */
    .glass {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
    }

    .glass-interactive {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glass-interactive:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-active);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-deep);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary);
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-glow {
      0% { box-shadow: 0 0 0 0 rgba(0, 210, 196, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(0, 210, 196, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 210, 196, 0); }
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    .animate-fade {
      animation: fadeIn 0.4s ease-out forwards;
    }
    .glow-active {
      animation: pulse-glow 2s infinite;
    }
    .pulse-heart {
      animation: heartbeat 1.2s infinite;
    }

    /* Form Styles */
    input, select, textarea {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      padding: 12px 16px;
      font-family: var(--font-body);
      font-size: 0.95rem;
      transition: all 0.3s ease;
      width: 100%;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-glow);
      background: rgba(15, 23, 42, 0.8);
    }
    label {
      display: block;
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Buttons */
    .btn {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.95rem;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn-primary {
      background: var(--primary-gradient);
      color: #0b0f19;
    }
    .btn-primary:hover {
      box-shadow: 0 0 15px var(--primary-glow);
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: var(--secondary-gradient);
      color: #ffffff;
    }
    .btn-secondary:hover {
      box-shadow: 0 0 15px var(--secondary-glow);
      transform: translateY(-1px);
    }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--text-primary);
    }
    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--text-secondary);
    }
    .btn-danger {
      background: linear-gradient(135deg, var(--accent-red) 0%, #b91c1c 100%);
      color: white;
    }
    .btn-danger:hover {
      box-shadow: 0 0 12px rgba(248, 113, 113, 0.25);
      transform: translateY(-1px);
    }

    /* Layout */
    .app-container {
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 260px;
      padding: 24px;
      border-right: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
      background: rgba(11, 15, 25, 0.9);
      backdrop-filter: blur(10px);
      position: fixed;
      height: 100vh;
      z-index: 100;
    }
    .main-content {
      flex: 1;
      margin-left: 260px;
      padding: 40px;
      max-width: 1400px;
    }

    @media (max-width: 768px) {
      .app-container {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        height: auto;
        position: relative;
        padding: 16px;
        border-right: none;
        border-bottom: 1px solid var(--border-light);
      }
      .main-content {
        margin-left: 0;
        padding: 20px;
      }
    }

    /* Custom SVGs and layout panels */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }
    .main-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 24px;
    }
    .alert-box {
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-weight: bold;
      text-align: center;
    }
    .alert-emergency {
      background-color: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 40px;">
        <div style="background: var(--primary-gradient); padding: 8px; border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--primary-glow);">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0b0f19" stroke-width="2.5"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        </div>
        <div>
          <h1 style="font-family: var(--font-display); fontSize: 1.35rem; font-weight: 800; letter-spacing: -0.5px;">
            MediAssist<span style="color: var(--primary);">AI</span>
          </h1>
          <span style="font-size: 0.7rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">
            SDG 3 Web Companion
          </span>
        </div>
      </div>

      <nav style="display: flex; flex-direction: column; gap: 8px; flex: 1;">
        <button onclick="switchTab('dashboard')" id="nav-dashboard" class="btn btn-primary" style="justify-content: flex-start; width: 100%; border: none; padding: 12px 16px;">
          📊 Dashboard
        </button>
        <button onclick="switchTab('medications')" id="nav-medications" class="btn btn-outline" style="justify-content: flex-start; width: 100%; border: none; padding: 12px 16px;">
          💊 Schedule
        </button>
        <button onclick="switchTab('symptoms')" id="nav-symptoms" class="btn btn-outline" style="justify-content: flex-start; width: 100%; border: none; padding: 12px 16px;">
          📈 Symptom Diary
        </button>
        <button onclick="switchTab('vitals')" id="nav-vitals" class="btn btn-outline" style="justify-content: flex-start; width: 100%; border: none; padding: 12px 16px;">
          ❤️ Vitals Tracker
        </button>
        <button onclick="switchTab('chatbot')" id="nav-chatbot" class="btn btn-outline" style="justify-content: flex-start; width: 100%; border: none; padding: 12px 16px;">
          🤖 AI Assistant
        </button>
        <button onclick="switchTab('report')" id="nav-report" class="btn btn-outline" style="justify-content: flex-start; width: 100%; border: none; padding: 12px 16px;">
          📝 Project Report
        </button>
      </nav>

      <!-- Cloud hosting status -->
      <div class="glass" style="padding: 12px; border-radius: var(--radius-sm); font-size: 0.8rem; display: flex; align-items: center; gap: 8px;">
        <div style="width: 8px; height: 8px; border-radius: 50%; background-color: #10b981; box-shadow: 0 0 8px #10b981;"></div>
        <span style="color: var(--text-secondary);">Web Edition Online</span>
      </div>
    </aside>

    <!-- Main Content Pane -->
    <main class="main-content">
      <div id="tab-content" class="animate-fade"></div>
    </main>
  </div>

  <script>
    // Local DB Seeding logic on first load
    function initDatabase() {
      if (!localStorage.getItem('seeded')) {
        const defaultMeds = [
          { id: 1, name: "Aspirin", dosage: "81mg", frequency: "Daily", time: ["08:00"], start_date: "2026-06-05", instructions: "Take with food in the morning", active: true },
          { id: 2, name: "Metformin", dosage: "500mg", frequency: "Twice a day", time: ["08:00", "20:00"], start_date: "2026-06-05", instructions: "Take with meals", active: true },
          { id: 3, name: "Lisinopril", dosage: "10mg", frequency: "Daily", time: ["20:00"], start_date: "2026-06-08", instructions: "Take at bedtime", active: true }
        ];
        
        // Seed medication logs for past 7 days
        const logs = [];
        const today = new Date();
        for (let i = 0; i < 7; i++) {
          const dateStr = getOffsetDateString(today, -i);
          // Aspirin log
          logs.push({ id: logs.length+1, medication_id: 1, medication_name: "Aspirin", dosage: "81mg", date: dateStr, time: "08:00", status: i !== 2 ? "Taken" : "Missed" });
          // Metformin logs
          logs.push({ id: logs.length+1, medication_id: 2, medication_name: "Metformin", dosage: "500mg", date: dateStr, time: "08:00", status: "Taken" });
          logs.push({ id: logs.length+1, medication_id: 2, medication_name: "Metformin", dosage: "500mg", date: dateStr, time: "20:00", status: i !== 4 ? "Taken" : "Missed" });
          // Lisinopril logs (started 5 days ago)
          if (i <= 5) {
            logs.push({ id: logs.length+1, medication_id: 3, medication_name: "Lisinopril", dosage: "10mg", date: dateStr, time: "20:00", status: "Taken" });
          }
        }

        const symptoms = [
          { id: 1, date: getOffsetDateString(today, -4), symptom: "Mild Headache", severity: 3, notes: "Felt in the afternoon, resolved after hydration." },
          { id: 2, date: getOffsetDateString(today, -2), symptom: "Fatigue", severity: 4, notes: "Felt sluggish after lunch." },
          { id: 3, date: getOffsetDateString(today, -1), symptom: "Dizziness", severity: 2, notes: "Felt briefly when standing up quickly." }
        ];

        const vitals = [
          { id: 1, date: getOffsetDateString(today, -4), systolic: 118, diastolic: 79, blood_sugar: 92, heart_rate: 68 },
          { id: 2, date: getOffsetDateString(today, -3), systolic: 122, diastolic: 81, blood_sugar: 98, heart_rate: 70 },
          { id: 3, date: getOffsetDateString(today, -2), systolic: 120, diastolic: 80, blood_sugar: 95, heart_rate: 72 },
          { id: 4, date: getOffsetDateString(today, -1), systolic: 124, diastolic: 83, blood_sugar: 105, heart_rate: 75 },
          { id: 5, date: getOffsetDateString(today, 0), systolic: 119, diastolic: 78, blood_sugar: 90, heart_rate: 69 }
        ];

        localStorage.setItem('medications', JSON.stringify(defaultMeds));
        localStorage.setItem('logs', JSON.stringify(logs));
        localStorage.setItem('symptoms', JSON.stringify(symptoms));
        localStorage.setItem('vitals', JSON.stringify(vitals));
        localStorage.setItem('seeded', 'true');
      }
    }

    // Helper functions
    function getOffsetDateString(baseDate, offsetDays) {
      const d = new Date(baseDate);
      d.setDate(d.getDate() + offsetDays);
      return d.toISOString().split('T')[0];
    }
    
    function getTodayString() {
      return new Date().toISOString().split('T')[0];
    }

    // Active tab router
    let currentTab = 'dashboard';
    
    function switchTab(tabId) {
      // Toggle nav buttons
      document.querySelectorAll('.sidebar nav button').forEach(btn => {
        btn.className = 'btn btn-outline';
        btn.style.justifyContent = 'flex-start';
        btn.style.width = '100%';
        btn.style.border = 'none';
        btn.style.padding = '12px 16px';
      });
      const activeBtn = document.getElementById(`nav-${tabId}`);
      if (activeBtn) {
        activeBtn.className = 'btn btn-primary';
        activeBtn.style.justifyContent = 'flex-start';
        activeBtn.style.width = '100%';
        activeBtn.style.border = 'none';
        activeBtn.style.padding = '12px 16px';
      }

      currentTab = tabId;
      renderActiveTab();
    }

    // Tab Renderers
    function renderActiveTab() {
      const container = document.getElementById('tab-content');
      container.innerHTML = '';
      
      if (currentTab === 'dashboard') {
        renderDashboard(container);
      } else if (currentTab === 'medications') {
        renderMedications(container);
      } else if (currentTab === 'symptoms') {
        renderSymptoms(container);
      } else if (currentTab === 'vitals') {
        renderVitals(container);
      } else if (currentTab === 'chatbot') {
        renderChatbot(container);
      } else if (currentTab === 'report') {
        renderReport(container);
      }
    }

    // ----------------------------------------------------
    // TAB: Dashboard
    // ----------------------------------------------------
    function renderDashboard(el) {
      const logs = JSON.parse(localStorage.getItem('logs')) || [];
      const meds = JSON.parse(localStorage.getItem('medications')) || [];
      const symptoms = JSON.parse(localStorage.getItem('symptoms')) || [];
      const vitals = JSON.parse(localStorage.getItem('vitals')) || [];
      const todayStr = getTodayString();

      // Ensure logs exist for today
      initializeTodayLogs(meds, logs, todayStr);

      // Calculations
      const last7DaysLogs = logs.filter(l => {
        const logDate = new Date(l.date);
        const cutoff = new Date();
        cutoff.setDate(cutoff.getDate() - 7);
        return logDate >= cutoff && l.status !== 'Pending';
      });
      const taken = last7DaysLogs.filter(l => l.status === 'Taken').length;
      const totalRecorded = last7DaysLogs.length;
      const compliance = totalRecorded === 0 ? 100 : Math.round((taken / totalRecorded) * 100);

      // Counters
      const allToday = logs.filter(l => l.date === todayStr);
      const todayTaken = allToday.filter(l => l.status === 'Taken').length;
      const todayMissed = allToday.filter(l => l.status === 'Missed').length;
      const todayPending = allToday.filter(l => l.status === 'Pending').length;

      // Symptom Average
      const recentSymptoms = symptoms.slice(-10);
      const avgSymptom = recentSymptoms.length === 0 ? 0 : (recentSymptoms.reduce((acc, s) => acc + s.severity, 0) / recentSymptoms.length).toFixed(1);

      // Latest vital
      const latestVital = vitals[vitals.length - 1];

      // Gauge math
      const radius = 50;
      const circumference = 2 * Math.PI * radius;
      const strokeDashoffset = circumference - (compliance / 100) * circumference;

      el.innerHTML = `
        <div style="display: flex; flex-direction: column; gap: 32px;">
          <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
            <div>
              <h2 style="font-family: var(--font-display); font-size: 2rem; font-weight: 700; margin-bottom: 6px;">Good Health Dashboard</h2>
              <p style="color: var(--text-secondary);">Real-time compliance tracking & health metrics targeting UN SDG Goal 3.</p>
            </div>
            <div class="glass" style="padding: 10px 16px; display: flex; align-items: center; gap: 10px; font-size: 0.9rem; color: var(--primary); font-weight: 600;">
              📅 ${new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
            </div>
          </div>

          <div class="kpi-grid">
            <div class="glass" style="padding: 24px; display: flex; align-items: center; gap: 24px;">
              <div style="position: relative; width: 120px; height: 120px;">
                <svg width="120" height="120" style="transform: rotate(-90deg);">
                  <circle cx="60" cy="60" r="${radius}" fill="transparent" stroke="rgba(255,255,255,0.05)" stroke-width="10" />
                  <circle cx="60" cy="60" r="${radius}" fill="transparent" stroke="var(--primary)" stroke-width="10" stroke-dasharray="${circumference}" stroke-dashoffset="${strokeDashoffset}" stroke-linecap="round" style="transition: stroke-dashoffset 0.8s ease;" />
                </svg>
                <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
                  <span style="font-size: 1.5rem; font-weight: 800; font-family: var(--font-display);">${compliance}%</span>
                </div>
              </div>
              <div>
                <h3 style="font-family: var(--font-display); font-size: 1.1rem; font-weight: 600; margin-bottom: 4px;">Adherence Score</h3>
                <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px;">Your 7-day average medication compliance rate.</p>
                <span style="font-size: 0.75rem; font-weight: 700; padding: 2px 8px; border-radius: 4px; background-color: ${compliance >= 85 ? 'rgba(16, 185, 129, 0.15)' : 'rgba(239, 68, 68, 0.15)'}; color: ${compliance >= 85 ? '#10b981' : '#ef4444'};">
                  ${compliance >= 85 ? 'Excellent Adherence' : 'Needs Attention'}
                </span>
              </div>
            </div>

            <div class="glass" style="padding: 24px; display: flex; flex-direction: column; justify-content: space-between;">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h3 style="font-family: var(--font-display); font-size: 1.1rem; font-weight: 600;">Dose Tracker</h3>
                <span>📋</span>
              </div>
              <div style="display: flex; gap: 16px; margin-top: 16px;">
                <div style="flex: 1; text-align: center; background: rgba(16, 185, 129, 0.08); padding: 10px; border-radius: 8px;">
                  <div style="color: #10b981; font-size: 1.5rem; font-weight: 700;">${todayTaken}</div>
                  <div style="font-size: 0.75rem; color: var(--text-secondary);">Taken</div>
                </div>
                <div style="flex: 1; text-align: center; background: rgba(239, 68, 68, 0.08); padding: 10px; border-radius: 8px;">
                  <div style="color: #ef4444; font-size: 1.5rem; font-weight: 700;">${todayMissed}</div>
                  <div style="font-size: 0.75rem; color: var(--text-secondary);">Missed</div>
                </div>
                <div style="flex: 1; text-align: center; background: rgba(251, 191, 36, 0.08); padding: 10px; border-radius: 8px;">
                  <div style="color: #fbbf24; font-size: 1.5rem; font-weight: 700;">${todayPending}</div>
                  <div style="font-size: 0.75rem; color: var(--text-secondary);">Pending</div>
                </div>
              </div>
            </div>

            <div class="glass" style="padding: 24px; display: flex; flex-direction: column; justify-content: space-between;">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <h3 style="font-family: var(--font-display); font-size: 1.1rem; font-weight: 600;">Latest Vitals</h3>
                <span class="pulse-heart" style="display: inline-block;">❤️</span>
              </div>
              ${latestVital ? `
                <div style="display: flex; flex-direction: column; gap: 4px; margin-top: 10px;">
                  <div style="display: flex; justify-content: space-between; font-size: 0.85rem;">
                    <span style="color: var(--text-secondary);">Blood Pressure:</span>
                    <strong style="color: #f87171;">${latestVital.systolic}/${latestVital.diastolic} <span style="font-size: 0.7rem; color: var(--text-muted);">mmHg</span></strong>
                  </div>
                  <div style="display: flex; justify-content: space-between; font-size: 0.85rem;">
                    <span style="color: var(--text-secondary);">Blood Sugar:</span>
                    <strong style="color: #00d2c4;">${latestVital.blood_sugar} <span style="font-size: 0.7rem; color: var(--text-muted);">mg/dL</span></strong>
                  </div>
                  <div style="display: flex; justify-content: space-between; font-size: 0.85rem;">
                    <span style="color: var(--text-secondary);">Heart Pulse:</span>
                    <strong style="color: #6366f1;">${latestVital.heart_rate} <span style="font-size: 0.7rem; color: var(--text-muted);">BPM</span></strong>
                  </div>
                </div>
              ` : `
                <button onclick="switchTab('vitals')" class="btn btn-outline" style="padding: 6px 12px; font-size: 0.8rem; margin-top: 12px;">Log Vitals</button>
              `}
            </div>

    function initializeTodayLogs(meds, logs, todayStr) {
      meds.forEach(med => {
        if (med.active) {
          med.time.forEach(t => {
            const exists = logs.find(l => l.medication_id === med.id && l.date === todayStr && l.time === t);
            if (!exists) {
              logs.push({
                id: logs.length + 1,
                medication_id: med.id,
                medication_name: med.name,
                dosage: med.dosage,
                date: todayStr,
                time: t,
                status: 'Pending'
              });
            }
          });
        }
      });
      localStorage.setItem('logs', JSON.stringify(logs));
    }

    function get7DayTrendData(logs) {
      const today = new Date();
      const dailyTrend = [];
      for (let i = 6; i >= 0; i--) {
        const dateStr = getOffsetDateString(today, -i);
        const dayLogs = logs.filter(l => l.date === dateStr);
        const taken = dayLogs.filter(l => l.status === 'Taken').length;
        const total = dayLogs.filter(l => l.status !== 'Pending').length;
        const compliance = total === 0 ? 100 : Math.round((taken / total) * 100);
        
        const dayLabel = new Date(dateStr).toLocaleDateString('en-US', { weekday: 'short' });
        dailyTrend.push({ date: dateStr, day: dayLabel, compliance });
      }
      return dailyTrend;
    }

    function renderSymptomSVGChart(container, data) {
      container.innerHTML = '';
      const sorted = [...data].slice(-7); // Last 7 logs
      const width = 450;
      const height = 180;
      const pad = 25;
      
      const xStep = (width - pad * 2) / (sorted.length - 1);
      const points = sorted.map((s, idx) => {
        const x = pad + idx * xStep;
        const y = height - pad - ((s.severity / 10) * (height - pad * 2));
        return { x, y, ...s };
      });

      const pathD = points.reduce((acc, p, idx) => idx === 0 ? `M ${p.x} ${p.y}` : `${acc} L ${p.x} ${p.y}`, '');

      let svg = `
        <svg viewBox="0 0 ${width} ${height}" style="width: 100%; max-height: 200px;">
          <line x1="${pad}" y1="${pad}" x2="${width - pad}" y2="${pad}" stroke="rgba(255,255,255,0.05)" stroke-dasharray="3,3" />
          <line x1="${pad}" y1="${height/2}" x2="${width - pad}" y2="${height/2}" stroke="rgba(255,255,255,0.05)" stroke-dasharray="3,3" />
          <line x1="${pad}" y1="${height - pad}" x2="${width - pad}" y2="${height - pad}" stroke="rgba(255,255,255,0.1)" />
          <path d="${pathD}" fill="none" stroke="var(--primary)" stroke-width="3" />
      `;

      points.forEach(p => {
        let col = '#10b981';
        if (p.severity > 3 && p.severity <= 6) col = '#fbbf24';
        else if (p.severity > 6) col = '#f87171';

        svg += `
          <g>
            <circle cx="${p.x}" cy="${p.y}" r="5" fill="${col}" stroke="var(--bg-deep)" stroke-width="2" />
            <text x="${p.x}" y="${p.y - 8}" font-size="9" fill="var(--text-primary)" text-anchor="middle" font-weight="bold">${p.severity}</text>
            <text x="${p.x}" y="${height - 8}" font-size="8" fill="var(--text-secondary)" text-anchor="middle">${p.date.substring(5)}</text>
          </g>
        `;
      });

      svg += `</svg>`;
      container.innerHTML = svg;
    }

    function renderBpSVGChart(container, data) {
      container.innerHTML = '';
      const sorted = [...data].slice(-7); // Last 7 logs
      const width = 450;
      const height = 180;
      const pad = 25;
      
      const xStep = (width - pad * 2) / (sorted.length - 1);
      const minVal = 40;
      const maxVal = 180;
      const scale = (val) => height - pad - (((val - minVal) / (maxVal - minVal)) * (height - pad * 2));

      const sysPoints = sorted.map((d, idx) => ({ x: pad + idx * xStep, y: scale(d.systolic) }));
      const diaPoints = sorted.map((d, idx) => ({ x: pad + idx * xStep, y: scale(d.diastolic) }));

      const sysPath = sysPoints.reduce((acc, p, idx) => idx === 0 ? `M ${p.x} ${p.y}` : `${acc} L ${p.x} ${p.y}`, '');
      const diaPath = diaPoints.reduce((acc, p, idx) => idx === 0 ? `M ${p.x} ${p.y}` : `${acc} L ${p.x} ${p.y}`, '');

      let svg = `
        <svg viewBox="0 0 ${width} ${height}" style="width: 100%; max-height: 200px;">
          <!-- Grid lines -->
          ${[60, 100, 140, 180].map(v => `
            <line x1="${pad}" y1="${scale(v)}" x2="${width - pad}" y2="${scale(v)}" stroke="rgba(255,255,255,0.05)" stroke-dasharray="3,3" />
            <text x="${pad - 5}" y="${scale(v) + 3}" font-size="8" fill="var(--text-muted)" text-anchor="end">${v}</text>
          `).join('')}

          <!-- Paths -->
          <path d="${sysPath}" fill="none" stroke="#f87171" stroke-width="2.5" />
          <path d="${diaPath}" fill="none" stroke="#6366f1" stroke-width="2.5" />
      `;

      sorted.forEach((d, idx) => {
        const sysP = sysPoints[idx];
        const diaP = diaPoints[idx];
        svg += `
          <g>
            <circle cx="${sysP.x}" cy="${sysP.y}" r="3" fill="#f87171" />
            <circle cx="${diaP.x}" cy="${diaP.y}" r="3" fill="#6366f1" />
            <text x="${sysP.x}" y="${sysP.y - 6}" font-size="8" fill="var(--text-primary)" text-anchor="middle" font-weight="bold">${d.systolic}</text>
            <text x="${diaP.x}" y="${diaP.y + 9}" font-size="8" fill="var(--text-primary)" text-anchor="middle" font-weight="bold">${d.diastolic}</text>
            <text x="${sysP.x}" y="${height - 5}" font-size="8" fill="var(--text-secondary)" text-anchor="middle">${d.date.substring(5)}</text>
          </g>
        `;
      });

      svg += `</svg>`;
      container.innerHTML = svg;
    }

    function formatMarkdown(text) {
      let html = text.replace(/⚠️ \*\*CRITICAL EMERGENCY ALERT\*\* ⚠️/g, '<div class="alert-box alert-emergency">⚠️ CRITICAL EMERGENCY ALERT ⚠️</div>');
      html = html.replace(/⚠️ \*\*Safety Warning:\*\*/g, '<strong style="color: var(--accent-red)">⚠️ Safety Warning:</strong>');
      html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      html = html.split('\n').map(line => line.trim().startsWith('* ') ? `<li style="margin-left: 20px; margin-bottom: 4px;">${line.substring(2)}</li>` : line).join('\n');
      html = html.replace(/\n/g, '<br/>');
      return html;
    }

    // Client NLP Chatbot Response Dictionary
    function getClientBotResponse(text) {
      const msg = text.toLowerCase().trim();
      const emergency = ["chest pain", "heart attack", "breathing", "stroke", "droop"];
      if (emergency.some(k => msg.includes(k))) {
        return {
          response: "⚠️ **CRITICAL EMERGENCY ALERT** ⚠️\n\nThe symptoms you described can be life-threatening. **Please call emergency medical services immediately (e.g., 911) or visit the nearest ER.**",
          type: "emergency",
          suggestions: ["Emergency Tips", "First Aid Info"]
        };
      }

      if (msg.includes("hello") || msg.includes("hi ") || msg.includes("hey")) {
        return {
          response: "👋 Hello! I am **MediAssist AI**, your SDG 3 medical advisor.\n\nAsk me about:\n* 💊 Medication side effects (Aspirin, Metformin, Lisinopril)\n* ⚠️ What to do for missed doses\n* 🥗 General wellness tips",
          suggestions: ["Aspirin dosage", "What is SDG 3?", "Missed dose protocols"]
        };
      }

      if (msg.includes("sdg") || msg.includes("sustainable development")) {
        return {
          response: "🎯 **UN SDG Goal 3: Good Health and Well-being**\n\nSDG 3 focuses on ensuring healthy lives and promoting well-being for all ages.\n\nMediAssistAI supports this by enhancing dosage adherence, logging vitals early, and raising clinical literacy.",
          suggestions: ["Healthy tips", "How this app helps"]
        };
      }

      if (msg.includes("aspirin")) {
        return {
          response: "💊 **Aspirin (Antiplatelet / Pain Reliever):**\n\n* **Uses:** Prescribed in low dose (81mg) to prevent blood clots, heart attacks, or stroke.\n* **Timing:** Take with food or water to protect stomach lining.\n* **⚠️ Warnings:** Watch for dark tarry stools or vomiting blood, indicating GI bleeding.",
          suggestions: ["Aspirin warnings", "Missed aspirin dose"]
        };
      }

      if (msg.includes("metformin")) {
        return {
          response: "💊 **Metformin (Diabetes Treatment):**\n\n* **Uses:** Lowers blood glucose levels for Type 2 Diabetes.\n* **Timing:** Take with breakfast and dinner to reduce stomach upset.\n* **⚠️ Warnings:** Limit alcohol. Report extreme fatigue or muscle pains.",
          suggestions: ["Metformin side effects", "Diabetes diet tips"]
        };
      }

      if (msg.includes("lisinopril")) {
        return {
          response: "💊 **Lisinopril (Blood Pressure Regulator):**\n\n* **Uses:** Treats High Blood Pressure and Heart Failure.\n* **Timing:** Usually taken at bedtime to prevent dizziness.\n* **⚠️ Warnings:** Seek emergency care if you experience facial/tongue swelling (angioedema).",
          suggestions: ["Lisinopril dry cough", "BP tracking tips"]
        };
      }

      if (msg.includes("miss") && (msg.includes("dose") || msg.includes("pill"))) {
        return {
          response: "❓ **Missed Dose Rule of Thumb:**\n\n1. Take the missed dose as soon as you remember.\n2. If it is almost time for your next dose, **skip the missed dose**.\n3. **⚠️ NEVER DOUBLE THE DOSE** to catch up.",
          suggestions: ["Show scheduled times", "Ask doctor"]
        };
      }

      // Fallback
      return {
        response: "🤖 **MediAssist AI Companion:**\n\nRemember to maintain a balanced lifestyle (proper hydration, consistent sleep, and regular vitals tracking). Record your metrics in our **Vitals Tracker** to share with your physician during checkups.\n\n*Disclaimer: I am an AI, not a doctor. Consult a physician for clinical advice.*",
        suggestions: ["Aspirin information", "Log vitals details"]
      };
    }

    window.sendChatMessage = function(customText) {

        const reply = getClientBotResponse(text);
        chatMessages.push({
          sender: 'bot',
          text: reply.response,
          type: reply.type,
          suggestions: reply.suggestions
        });
        renderChatMessages();
      }, 500);
    };
